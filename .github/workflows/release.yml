name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build app
        run: |
          xcodebuild \
            -project Lineage.xcodeproj \
            -scheme Lineage \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.SIGNING_IDENTITY }}" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            clean build

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p dist
          create-dmg \
            --volname "Lineage" \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 200 \
            "dist/Lineage-${GITHUB_REF_NAME}.dmg" \
            "build/Build/Products/Release/Lineage.app"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -e
          DMG="dist/Lineage-${GITHUB_REF_NAME}.dmg"

          SUBMIT_JSON=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --output-format json \
            --wait)
          echo "$SUBMIT_JSON"

          STATUS=$(echo "$SUBMIT_JSON" | jq -r .status)
          ID=$(echo "$SUBMIT_JSON" | jq -r .id)

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization status: $STATUS. Fetching notary log for $ID..."
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" || true
            exit 1
          fi

          xcrun stapler staple "$DMG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Lineage-*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
