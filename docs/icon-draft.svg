<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F8FA"/>
      <stop offset="100%" stop-color="#E5E9F0"/>
    </linearGradient>
    <linearGradient id="g-chip-selected" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E4EEFB"/>
      <stop offset="100%" stop-color="#A8C0DD"/>
    </linearGradient>
  </defs>

  <!-- LAYER: BACKGROUND -->
  <g id="layer-background">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#canvas)"/>
  </g>

  <!-- LAYER: RAYS (massively thick — these are the icon's identity at small sizes) -->
  <g id="layer-rays" fill="none" stroke-linecap="round">
    <!-- Upstream (blue): 3 rays radiating up from top of selected -->
    <g stroke="#2E70CA" stroke-width="78">
      <line x1="512" y1="420" x2="160" y2="120"/>
      <line x1="512" y1="420" x2="512" y2="80"/>
      <line x1="512" y1="420" x2="864" y2="120"/>
    </g>
    <!-- Downstream (orange): 3 rays radiating down from bottom of selected -->
    <g stroke="#E97C2A" stroke-width="78">
      <line x1="512" y1="604" x2="160" y2="904"/>
      <line x1="512" y1="604" x2="512" y2="944"/>
      <line x1="512" y1="604" x2="864" y2="904"/>
    </g>
  </g>

  <!-- LAYER: SELECTED CHIP (the dominant subject — ~62% of canvas width) -->
  <g id="layer-selected">
    <rect x="192" y="408" width="640" height="208" rx="104" fill="url(#g-chip-selected)" stroke="#5C7896" stroke-width="4"/>
    <!-- Two bold white "text" bars centered in chip -->
    <rect x="312" y="478" width="400" height="28" rx="14" fill="#FFFFFF" opacity="0.97"/>
    <rect x="372" y="522" width="280" height="22" rx="11" fill="#FFFFFF" opacity="0.85"/>
  </g>
</svg>
